<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座位管理系統</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 20px; background-color: #fcfbfa; color: #3d3d3d; }
        h1 { color: #2c3e50; margin-bottom: 5px;}
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        .control-panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; border: 1px solid #f0ede9; }
        button { border: none; padding: 8px 14px; font-size: 13px; border-radius: 4px; cursor: pointer; transition: background 0.2s; color: white; background-color: #5c8ebb; }
        button:hover { filter: brightness(0.9); }
        button.btn-secondary { background-color: #a0aab0; }
        button.btn-github { background-color: #3e444a; }
        button.btn-success { background-color: #61a092; }
        button.btn-warning { background-color: #d99a6c; }
        button:disabled { background-color: #d1d8dc; cursor: not-allowed; }
        .git-select-wrapper { display: flex; align-items: center; gap: 5px; }
        select { padding: 7px 10px; font-size: 13px; border-radius: 4px; border: 1px solid #dcd7d0; background: white; max-width: 180px; color: #4a4a4a; }
        #githubQuickSaveBtn { display: none; }
        .current-status { font-size: 12px; color: #4a7c59; font-weight: bold; margin-left: 5px; }
        
        /* 縮小後的刷色工具區塊 */
        .color-selector-tool { display: flex; align-items: center; gap: 8px; background: #f2efe9; padding: 8px 12px; border-radius: 4px; font-size: 13px; flex-wrap: wrap; width: 100%; margin-top: 5px; }
        .color-group { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 85px; height: 38px; padding: 2px; box-sizing: border-box; border: 1px solid #e0dbd3; border-radius: 4px; cursor: pointer; }
        .color-group.active { border: 2px solid #555; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        
        .color-label, .seat-input { width: 95%; border: none; text-align: center; font-size: 11px; background: transparent; outline: none; color: #444; font-weight: bold; }
        .color-label::placeholder { font-size: 11px; color: #444; opacity: 0.85; }
        
        .grid-container { overflow: auto; max-width: 100%; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #f0ede9; }
        table { border-collapse: collapse; user-select: none; }
        th, td { border: 1px solid #e6e1da; text-align: center; position: relative; }
        th { background-color: #f5f2eb; font-size: 11px; color: #6e6e6e; padding: 5px; font-weight: normal; }
        
        .row-header { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 2px; padding: 4px; width: 65px; box-sizing: border-box; }
        .row-header .axis-label { width: 100%; text-align: center; margin-bottom: 2px; }

        .axis-label { font-weight: bold; color: #4a4a4a; }
        .op-btn { font-size: 10px; padding: 1px 4px; margin: 1px; background: #decac0; color: #555; border-radius: 2px; border: none; cursor: pointer; }
        .op-btn:hover { background: #ccafa3; }
        .seat-cell { width: 110px; height: 55px; padding: 4px; box-sizing: border-box; background-color: #ffffff; transition: background-color 0.1s; }
        .seat-id { font-size: 10px; color: #888; display: block; margin-bottom: 2px; pointer-events: none; font-weight: bold; }
        
        /* === 減糖粉彩 / 微糖莫蘭迪色系 (Light Morandi) === */
        /* 在飽和粉彩與沉悶莫蘭迪之間取得完美平衡：明亮、舒適、高辨識度 */
        .c-white      { background-color: #ffffff; }
        .c-red        { background-color: #f7c5c2; } /* 高胡 - 燕麥粉紅 */
        .c-orange     { background-color: #f6d2b3; } /* 中胡 - 柔紗暖橘 */
        .c-yellow     { background-color: #f4e5a9; } /* 二胡-1 - 淡洋甘菊 */
        .c-green      { background-color: #c4ebd0; } /* 二胡-2 - 薄荷鼠尾草 */
        .c-blue       { background-color: #c5dcf2; } /* 低音 - 迷霧晴藍 */
        .c-purple     { background-color: #dec8e3; } /* 古箏 - 丁香輕紫 */
        .c-pink       { background-color: #f7cae1; } /* 揚琴 - 霧透莓粉 */
        .c-cyan       { background-color: #c3eee7; } /* 柳琴 - 晨露青瓷 */
        .c-lime       { background-color: #d6f0b4; } /* 琵琶 - 酪梨青綠 */
        .c-brown      { background-color: #e5d4c3; } /* 中阮 - 溫潤奶茶 */
        .c-navy       { background-color: #ced9e3; } /* 大阮 - 亞麻灰藍 */
        .c-olive      { background-color: #f4ecc1; } /* 嗩吶 - 柔白乳酪 */
        .c-teal       { background-color: #baeade; } /* 笙 - 冰川湖綠 */
        .c-magenta    { background-color: #f3cbd6; } /* 笛子 - 暮光煙粉 */
        .c-gold       { background-color: #edd3bc; } /* 打擊 - 暗香檳金 */

        .unsaved-warning {
            position: fixed; top: 20px; right: 20px; background-color: #fff6f5; color: #c0392b; border: 2px solid #e74c3c;
            padding: 10px 16px; border-radius: 6px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.1);
            z-index: 9999; display: none; animation: warningPulse 2s infinite;
        }
        @keyframes warningPulse {
            0% { opacity: 0.9; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.1); }
            50% { opacity: 1; box-shadow: 0 4px 20px rgba(231, 76, 60, 0.3); border-color: #c0392b; color: #c0392b; }
            100% { opacity: 0.9; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.1); }
        }
    </style>
</head>
<body>

    <div id="unsavedWarning" class="unsaved-warning">⚠️ 偵測到未儲存的變更，請記得儲存檔案！</div>

    <h1>座位排定系統</h1>
    
    <div class="control-panel">
        <button class="btn-secondary" id="undoBtn" disabled>上一步 (Undo)</button>
        <div class="git-select-wrapper">
            <select id="githubFileSelect"><option value="">-- 讀取舊檔 (加載中) --</option></select>
            <button id="githubLoadBtn" style="background-color: #79618a;">讀取舊檔</button>
        </div>
        <button class="btn-success" id="githubQuickSaveBtn">儲存檔案</button>
        <button class="btn-github" id="githubUploadBtn">另存新檔</button>
        <span class="current-status" id="currentFileStatus">目前狀態：新建立的座位表</span>

        <div class="color-selector-tool">
            <span>刷色工具：</span>
            <div class="color-group c-white active" data-color="white"><input type="text" class="color-label" data-color="white" placeholder="一般(白)" readonly></div>
            <div class="color-group c-red" data-color="red"><input type="text" class="color-label" data-color="red" placeholder="高胡" readonly></div>
            <div class="color-group c-orange" data-color="orange"><input type="text" class="color-label" data-color="orange" placeholder="中胡" readonly></div>
            <div class="color-group c-yellow" data-color="yellow"><input type="text" class="color-label" data-color="yellow" placeholder="二胡-1" readonly></div>
            <div class="color-group c-green" data-color="green"><input type="text" class="color-label" data-color="green" placeholder="二胡-2" readonly></div>
            <div class="color-group c-blue" data-color="blue"><input type="text" class="color-label" data-color="blue" placeholder="低音" readonly></div>
            <div class="color-group c-purple" data-color="purple"><input type="text" class="color-label" data-color="purple" placeholder="古箏" readonly></div>
            <div class="color-group c-pink" data-color="pink"><input type="text" class="color-label" data-color="pink" placeholder="揚琴" readonly></div>
            <div class="color-group c-cyan" data-color="cyan"><input type="text" class="color-label" data-color="cyan" placeholder="柳琴" readonly></div>
            <div class="color-group c-lime" data-color="lime"><input type="text" class="color-label" data-color="lime" placeholder="琵琶" readonly></div>
            <div class="color-group c-brown" data-color="brown"><input type="text" class="color-label" data-color="brown" placeholder="中阮" readonly></div>
            <div class="color-group c-navy" data-color="navy"><input type="text" class="color-label" data-color="navy" placeholder="大阮" readonly></div>
            <div class="color-group c-olive" data-color="olive"><input type="text" class="color-label" data-color="olive" placeholder="嗩吶" readonly></div>
            <div class="color-group c-teal" data-color="teal"><input type="text" class="color-label" data-color="teal" placeholder="笙" readonly></div>
            <div class="color-group c-magenta" data-color="magenta"><input type="text" class="color-label" data-color="magenta" placeholder="笛子" readonly></div>
            <div class="color-group c-gold" data-color="gold"><input type="text" class="color-label" data-color="gold" placeholder="打擊" readonly></div>
            <button type="button" class="btn-warning" id="renameCategoryBtn">✏️ 修改類別名稱</button>
        </div>
    </div>

    <div class="grid-container"><table id="seatTable"></table></div>

    <script>
        // ==========================================
        // === 這裡填入你的 GitHub 資訊 (已完成混淆) ===
        // ==========================================
        const OBFUSCATED_TOKEN = "jksbEToTSyrRTFVg:yquwjpInEZ7qdZ|ye4gG9]m"; 
        const GIT_OWNER = "AlanHsuLab";
        const GIT_REPO  = "RollCall"; 
        const GIT_FOLDER  = "seatdata";
        // ==========================================

        let totalRows = 10, totalCols = 20, currentColor = 'white', currentEditingFileName = "";
        let historyStack = [];
        const maxHistory = 30;

        const table = document.getElementById('seatTable');
        const undoBtn = document.getElementById('undoBtn');
        const warningEl = document.getElementById('unsavedWarning');
        
        const colorMap = { 
            'white': 'W', 'red': 'R', 'orange': 'O', 'yellow': 'Y', 'green': 'G', 'blue': 'B', 'purple': 'P',
            'pink': 'K', 'cyan': 'C', 'lime': 'L', 'brown': 'N', 'navy': 'V', 'olive': 'I', 'teal': 'T', 'magenta': 'M', 'gold': 'D'
        };
        const revColorMap = { 
            'W': 'white', 'R': 'red', 'O': 'orange', 'Y': 'yellow', 'G': 'green', 'B': 'blue', 'P': 'purple',
            'K': 'pink', 'C': 'cyan', 'L': 'lime', 'N': 'brown', 'V': 'navy', 'I': 'olive', 'T': 'teal', 'M': 'magenta', 'D': 'gold'
        };

        document.querySelectorAll('.color-group').forEach(group => {
            group.addEventListener('click', () => setActiveColor(group.dataset.color));
        });

        function setActiveColor(color) {
            document.querySelector('.color-group.active').classList.remove('active');
            document.querySelector(`.color-group[data-color="${color}"]`).classList.add('active');
            currentColor = color;
        }

        document.getElementById('renameCategoryBtn').addEventListener('click', () => {
            const currentInput = document.querySelector(`.color-label[data-color="${currentColor}"]`);
            if (!currentInput) return;
            
            const currentName = currentInput.value || currentInput.placeholder;
            const newName = prompt(`請輸入類別新名稱（目前：${currentName}）：`, currentInput.value);
            
            if (newName !== null) {
                saveState();
                currentInput.value = newName.trim();
                setUnsavedStatus(true);
            }
        });

        function setUnsavedStatus(isDirty) {
            if (isDirty) {
                warningEl.style.display = 'block';
            } else {
                warningEl.style.display = 'none';
            }
        }

        function saveState() {
            const currentState = serializeState();
            if (historyStack.length > 0 && historyStack[historyStack.length - 1] === currentState) return;
            historyStack.push(currentState);
            if (historyStack.length > maxHistory) historyStack.shift();
            undoBtn.disabled = false;
            setUnsavedStatus(true);
        }

        function undo() {
            if (historyStack.length === 0) return;
            const previousState = JSON.parse(historyStack.pop());
            totalRows = previousState.rows;
            totalCols = previousState.cols;
            Object.keys(previousState.labels).forEach(color => {
                const input = document.querySelector(`.color-label[data-color="${color}"]`);
                if (input) input.value = previousState.labels[color];
            });
            renderTable();
            restoreData(previousState.data);
            if (historyStack.length === 0) undoBtn.disabled = true;
            setUnsavedStatus(true);
        }

        function serializeState() {
            const labels = {};
            document.querySelectorAll('.color-label').forEach(input => labels[input.dataset.color] = input.value);
            return JSON.stringify({ rows: totalRows, cols: totalCols, labels: labels, data: backupData() });
        }

        undoBtn.addEventListener('click', undo);
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                if (document.activeElement.tagName !== 'INPUT' || document.activeElement.classList.contains('color-label')) {
                    e.preventDefault(); undo();
                }
            }
        });

        function renderTable() {
            table.innerHTML = '';
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = '<th>操作</th>' + Array.from({length: totalCols}, (_, c) => `
                <th>
                    <div class="axis-label">第 ${c+1} 欄</div>
                    <button class="op-btn" onclick="updateGrid('col', 'insert', ${c+1})">＋</button>
                    <button class="op-btn" onclick="updateGrid('col', 'delete', ${c+1})">－</button>
                </th>
            `).join('');
            table.appendChild(headerRow);

            for (let r = 1; r <= totalRows; r++) {
                const tr = document.createElement('tr');
                const leftTh = document.createElement('th');
                leftTh.innerHTML = `
                    <div class="row-header">
                        <div class="axis-label">第 ${r} 列</div>
                        <button class="op-btn" onclick="updateGrid('row', 'insert', ${r})">＋</button>
                        <button class="op-btn" onclick="updateGrid('row', 'delete', ${r})">－</button>
                    </div>`;
                tr.appendChild(leftTh);

                for (let c = 1; c <= totalCols; c++) {
                    const td = document.createElement('td');
                    td.className = `seat-cell c-white`;
                    td.dataset.row = r; td.dataset.col = c; td.dataset.color = 'white';

                    td.addEventListener('click', function(e) {
                        if(e.target.tagName !== 'INPUT' && this.dataset.color !== currentColor) {
                            saveState(); changeCellColor(this, currentColor);
                        }
                    });

                    const seatId = document.createElement('span');
                    seatId.className = 'seat-id'; seatId.innerText = `${r}-${c}`;

                    const input = document.createElement('input');
                    input.type = 'text'; input.className = 'seat-input'; input.placeholder = '空';
                    
                    input.addEventListener('pointerdown', () => {
                        if (td.dataset.color !== currentColor) { saveState(); changeCellColor(td, currentColor); }
                    });

                    let oldVal = "";
                    input.addEventListener('focus', (e) => oldVal = e.target.value);
                    input.addEventListener('blur', (e) => { if (e.target.value !== oldVal) saveState(); });

                    td.appendChild(seatId); td.appendChild(input); tr.appendChild(td);
                }
                table.appendChild(tr);
            }
        }

        function changeCellColor(tdElement, color) {
            Object.keys(colorMap).forEach(c => tdElement.classList.remove(`c-${c}`));
            tdElement.classList.add(`c-${color}`);
            tdElement.dataset.color = color;
        }

        window.updateGrid = function(type, action, index) {
            if (action === 'delete' && ((type === 'row' && totalRows <= 1) || (type === 'col' && totalCols <= 1))) return;
            saveState();
            let data = backupData();
            if (action === 'insert') {
                data = data.map(d => { if (d[type[0]] > index) d[type[0]]++; return d; });
                type === 'row' ? totalRows++ : totalCols++;
            } else {
                data = data.filter(d => d[type[0]] !== index).map(d => { if (d[type[0]] > index) d[type[0]]--; return d; });
                type === 'row' ? totalRows-- : totalCols--;
            }
            renderTable(); restoreData(data);
        };

        function backupData() {
            return Array.from(document.querySelectorAll('.seat-cell')).map(td => {
                const name = td.querySelector('.seat-input').value.trim();
                return { r: parseInt(td.dataset.row), c: parseInt(td.dataset.col), name, color: td.dataset.color };
            }).filter(d => d.name !== "" || d.color !== 'white');
        }

        function restoreData(dataArray) {
            dataArray.forEach(d => {
                const td = document.querySelector(`.seat-cell[data-row="${d.r}"][data-col="${d.c}"]`);
                if (td) { td.querySelector('.seat-input').value = d.name; changeCellColor(td, d.color); }
            });
        }

        function generateExportContent() {
            let exportLines = [`SIZE-${totalRows}-${totalCols}`];
            let labelParts = Array.from(document.querySelectorAll('.color-label')).map(input => `${colorMap[input.dataset.color]}:${input.value.trim() || input.placeholder}`);
            exportLines.push(`LABELS-${labelParts.join(',')}`);

            document.querySelectorAll('.seat-cell').forEach(td => {
                const name = td.querySelector('.seat-input').value.trim(), colorCode = colorMap[td.dataset.color];
                if (name !== "" || colorCode !== 'W') exportLines.push(`${td.dataset.row}-${td.dataset.col}-${name}-${colorCode}`);
            });
            return exportLines.join('\n');
        }

        function parseAndLoadTextContent(contents) {
            let incomingData = [], fileRows = totalRows, fileCols = totalCols, hasSizeMeta = false;

            contents.split('\n').forEach(line => {
                const cleanLine = line.replace('\r', '').trim();
                if(!cleanLine) return;

                if (cleanLine.startsWith('SIZE-')) {
                    const parts = cleanLine.split('-');
                    if(parts.length === 3) { fileRows = parseInt(parts[1]); fileCols = parseInt(parts[2]); hasSizeMeta = true; }
                    return; 
                }
                if (cleanLine.startsWith('LABELS-')) {
                    cleanLine.substring(7).split(',').forEach(g => {
                        const [code, labelName] = g.split(':'), color = revColorMap[code];
                        if(color) {
                            const input = document.querySelector(`.color-label[data-color="${color}"]`);
                            if (input) input.value = (labelName === input.placeholder) ? '' : labelName;
                        }
                    });
                    return;
                }
                const parts = cleanLine.split('-');
                if (parts.length >= 3) {
                    const r = parseInt(parts[0]), c = parseInt(parts[1]), name = parts[2], colorCode = parts[3] || 'W';
                    if(!isNaN(r) && !isNaN(c)) {
                        if (!hasSizeMeta) { if (r > fileRows) fileRows = r; if (c > fileCols) fileCols = c; }
                        incomingData.push({ r, c, name, color: revColorMap[colorCode] || 'white' });
                    }
                }
            });
            totalRows = fileRows; totalCols = fileCols;
            renderTable(); restoreData(incomingData);
        }

        function updateFileStatusUI() {
            const statusEl = document.getElementById('currentFileStatus'), quickSaveBtn = document.getElementById('githubQuickSaveBtn');
            if (currentEditingFileName) {
                statusEl.innerText = `目前編輯：${currentEditingFileName.replace('.txt', '')}`;
                statusEl.style.color = '#61a092'; quickSaveBtn.style.display = 'inline-block';
            } else {
                statusEl.innerText = "目前狀態：新建立的座位表";
                statusEl.style.color = '#7f8c8d'; quickSaveBtn.style.display = 'none';
            }
        }

        const cleanToken = () => {
            return Array.from(OBFUSCATED_TOKEN).map(c => String.fromCharCode(c.charCodeAt(0) - 3)).join('');
        };

        async function fetchGitHubFileList() {
            const url = `https://api.github.com/repos/${GIT_OWNER}/${GIT_REPO}/contents/${GIT_FOLDER}`;
            const selectEl = document.getElementById('githubFileSelect');
            try {
                const res = await fetch(url, { headers: { 'Authorization': `token ${cleanToken()}`, 'Accept': 'application/vnd.github.v3+json' } });
                if (!res.ok) { selectEl.innerHTML = '<option value="">-- 無法載入舊檔 --</option>'; return; }
                const items = await res.json(), txtFiles = items.filter(i => i.type === 'file' && i.name.endsWith('.txt'));
                selectEl.innerHTML = txtFiles.length ? '<option value="">-- 選擇舊座位表 --</option>' : '<option value="">-- 雲端無舊檔 --</option>';
                txtFiles.forEach(f => {
                    const opt = document.createElement('option'); opt.value = f.path; opt.innerText = f.name.slice(0, -4); selectEl.appendChild(opt);
                });
            } catch (e) { console.error(e); }
        }

        document.getElementById('githubLoadBtn').addEventListener('click', async () => {
            const targetPath = document.getElementById('githubFileSelect').value;
            if (!targetPath) return alert('請先從左側下拉選單選擇一個舊檔案！');

            const btn = document.getElementById('githubLoadBtn');
            btn.disabled = true; btn.innerText = '載入中...';
            try {
                const res = await fetch(`https://api.github.com/repos/${GIT_OWNER}/${GIT_REPO}/contents/${targetPath}`, { headers: { 'Authorization': `token ${cleanToken()}`, 'Accept': 'application/vnd.github.v3+json' } });
                if (!res.ok) throw new Error();
                const fileData = await res.json(), content = decodeURIComponent(escape(atob(fileData.content)));
                saveState(); parseAndLoadTextContent(content);
                currentEditingFileName = fileData.name; updateFileStatusUI();
                setUnsavedStatus(false);
                alert(`成功載入【${fileData.name.slice(0, -4)}】座位表！`);
            } catch (e) { alert('載入失敗或發生網路錯誤。'); }
            btn.disabled = false; btn.innerText = '讀取舊檔';
        });

        async function executeUploadToGitHub(fileName) {
            const fullPath = `${GIT_FOLDER}/${fileName}`, url = `https://api.github.com/repos/${GIT_OWNER}/${GIT_REPO}/contents/${fullPath}`;
            const content = generateExportContent(), base64Content = btoa(unescape(encodeURIComponent(content)));
            let sha = null;

            const getRes = await fetch(url, { headers: { 'Authorization': `token ${cleanToken()}`, 'Accept': 'application/vnd.github.v3+json' } });
            if (getRes.ok) { const fileData = await getRes.json(); sha = fileData?.sha; }

            const bodyData = { message: `Update seat file: ${fileName}`, content: base64Content };
            if (sha) bodyData.sha = sha;

            const putRes = await fetch(url, {
                method: 'PUT', headers: { 'Authorization': `token ${cleanToken()}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify(bodyData)
            });

            if (putRes.ok) {
                currentEditingFileName = fileName; updateFileStatusUI(); await fetchGitHubFileList();
                document.getElementById('githubFileSelect').value = fullPath; 
                setUnsavedStatus(false);
                return true;
            } else {
                throw new Error((await putRes.json()).message);
            }
        }

        document.getElementById('githubQuickSaveBtn').addEventListener('click', async () => {
            if (!currentEditingFileName) return;
            const btn = document.getElementById('githubQuickSaveBtn');
            btn.disabled = true; btn.innerText = '正在儲存...';
            try {
                await executeUploadToGitHub(currentEditingFileName);
                alert(`儲存成功！已更新檔案`);
            } catch (e) { alert(`儲存失敗：${e.message}`); }
            btn.disabled = false; btn.innerText = '儲存檔案';
        });

        document.getElementById('githubUploadBtn').addEventListener('click', async () => {
            let defaultName = currentEditingFileName ? currentEditingFileName.slice(0, -4) : `座位表_${totalRows}x${totalCols}`;
            let fileName = prompt("請輸入座位表名稱（請勿使用/符號）：", defaultName);
            if (!fileName) return;
            fileName = fileName.trim(); if (!fileName.endsWith('.txt')) fileName += '.txt';

            const btn = document.getElementById('githubUploadBtn');
            btn.disabled = true; btn.innerText = '正在同步...';
            try {
                await executeUploadToGitHub(fileName); alert(`【${fileName.slice(0, -4)}】存檔並同步成功！`);
            } catch (e) { alert(`上傳失敗：${e.message}`); }
            btn.disabled = false; btn.innerText = '另存新檔';
        });

        renderTable();
        setTimeout(fetchGitHubFileList, 500);
    </script>
</body>
</html>
